name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff flake8
      - name: Run ruff lint
        run: ruff check .
      - name: Run flake8
        run: flake8 .

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: |
          pip install -r requirements.txt
      - name: Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install security tools
        run: |
          pip install pip-audit gitleaks
      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip-audit --severity high --ignore‑scripts
      - name: Secret scanning (gitleaks)
        env:
          GITLEAKS_DISABLE_UPLOAD: true
        run: |
          gitleaks detect --source . --redact --no-git

  container-scan:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t flask-todo-api:${{ github.sha }} .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: flask-todo-api:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy:
    if: github.ref == 'refs/heads/main' && success()
    needs: container-scan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy placeholder
        run: echo "🛫 Deployment step would go here – e.g., push to registry & trigger a CD system."
